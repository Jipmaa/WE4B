<div class="login">
    <img src="assets/logo_utbm.png" alt="logo utbm" class="logo-utbm">
    <form (ngSubmit)="onLogin()">
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email :</label>
            <input type="email" [(ngModel)]="email" name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                placeholder="prenom.nom@utbm.fr" required>
            </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Mot de passe :</label>
            <input type="password" [(ngModel)]="password" name="password" class="form-control" id="exampleInputPassword1" placeholder="Mot de passe" required>
            <ion-icon name="eye-off-outline" (click)="TogglePass($event.target)"></ion-icon>
        </div>
        <button type="submit" class="btn btn-primary">Connexion</button>
        <div *ngIf="error" class="text-danger">{{ error }}</div>
    </form>
</div>
