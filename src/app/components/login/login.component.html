<div class="login">
    <form (ngSubmit)="onLogin()">
        <div class="titre">
            <h1>Connexion</h1>
            <img src="assets/logo_utbm.png" alt="logo utbm" class="logo-utbm">
            <p>Bienvenue sur le Moodle de l'UTBM! Connecte-toi pour accéder au contenu.</p>
        </div>

        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Adresse e-mail</label>
            <input type="email" [(ngModel)]="email" name="email" class="form-control" id="exampleInputEmail1"
                aria-describedby="emailHelp" placeholder="prenom.nom@utbm.fr" required>
        </div>
        <div class="mb-3 password-container">
            <div class="motdepasse"><label for="exampleInputPassword1" class="form-label">Mot de passe</label>
                <a>Mot de passe oublié ?</a>
            </div>
            <input type="password" [(ngModel)]="password" name="password" class="form-control"
                id="exampleInputPassword1" placeholder="Mot de passe" required>
            <ion-icon name="eye-off-outline" (click)="TogglePass($event.target)"></ion-icon>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
        </div>
        <button type="submit" class="btn btn-primary">Connexion</button>
        <div *ngIf="error" class="text-danger">{{ error }}</div>
    </form>
</div>
