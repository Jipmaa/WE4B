<div class="userform">
    <form [formGroup]="myForm" (ngSubmit)="onSubmit()" class="row g-3">
        <h1>Créer une UE</h1>

        <!-- Name -->
        <div class="col-12">
            <label for="inputName" class="form-label">Nom</label>
            <input type="text" class="form-control" id="inputName" name="name" placeholder="ex: Technologies web"
                formControlName="name">
            <ng-container *ngIf="myForm.get('name')?.dirty || myForm.get('name')?.touched">
                <div *ngIf="myForm.get('name')?.errors?.['required']; else nameValid">
                    ❌ Nom d'ue requis
                </div>
                <ng-template #nameValid>
                    <div class="text-success small">✅ Nom d'ue valide</div>
                </ng-template>
            </ng-container>
        </div>

        <!-- Code -->
        <div class="col-12">
            <label for="inputCode" class="form-label">Code</label>
            <input type="text" class="form-control" id="inputCode" name="nom" placeholder="ex: WE4A"
                formControlName="code">
            <ng-container *ngIf="myForm.get('code')?.dirty || myForm.get('code')?.touched">
                <div *ngIf="myForm.get('code')?.errors?.['required']; else codeValid">
                    ❌ Code requis
                </div>
                <ng-template #codeValid>
                    <div class="text-success small">✅ Code valide</div>
                </ng-template>
            </ng-container>
        </div>

        <!-- Type -->
        <div class="mb-3">
            <label for="inputType" class="form-label">Type</label>
            <select class="form-select" aria-label="Disabled select example" formControlName="type">
                <option value="" selected>Sélectionner une option</option>
                <option value="CS">CS</option>
                <option value="TM">TM</option>
                <option value="EC">EC</option>
                <option value="QC">QC</option>
                <option value="OM">OM</option>
            </select>
            <ng-container *ngIf="myForm.get('type')?.dirty || myForm.get('type')?.touched">
                <div *ngIf="myForm.get('type')?.errors?.['required']; else typeValid">
                    ❌ Type requis
                </div>
                <ng-template #typeValid>
                    <div class="text-success small">✅ Type valide</div>
                </ng-template>
            </ng-container>
        </div>

        <!-- Capacité -->
        <div class="col-12">
            <label for="inputCapacity" class="form-label">Capacité</label>
            <input type="text" class="form-control" id="inputCapacity" name="capacity"
                placeholder="Veuillez entrer un nombre" formControlName="capacity">
            <ng-container *ngIf="myForm.get('capacity')?.dirty || myForm.get('capacity')?.touched">
                <div *ngIf="myForm.get('capacity')?.errors?.['number']; else capacityValid">
                    ❌ Capacité requise
                </div>
                <ng-template #capacityValid>
                    <div class="text-success small">✅ Capacité valide</div>
                </ng-template>
            </ng-container>
        </div>

        <!-- Image de l'Ue -->
        <div class="mb-3">
            <label>Choisir une image</label>
            <div class="input-group mb-3">
                <input type="file" class="form-control" id="inputGroupFile02" name="img_path"
                    (change)="onFileSelected($event)" (click)="onFileClick()">
            </div>
            <ng-container *ngIf="myForm.get('img_path')?.dirty || myForm.get('img_path')?.touched">
                <div *ngIf="myForm.get('img_path')?.errors?.['required']" class="text-danger small">
                    ❌ Image requise
                </div>
                <div *ngIf="!myForm.get('img_path')?.invalid" class="text-success small">
                    ✅ Image valide
                </div>
            </ng-container>
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
        </div>

    </form>
</div>
