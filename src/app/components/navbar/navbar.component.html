<header class="w-full px-4 py-2 bg-primary inline-flex justify-between items-center">
  <div class="flex justify-start items-center gap-3 text-white">
    <span class="justify-start text-md font-medium">Mooodle</span>
    <nav class="flex justify-start items-center gap-3">
      <app-navbar-item [label]="'Accueil'" [link]="'/dashboard'"></app-navbar-item>
      <app-navbar-item [label]="'Mes cours'" [link]="'/listecours'"></app-navbar-item>
      <app-navbar-item [label]="'Forum'" [link]="'/forum'"></app-navbar-item>
      <app-navbar-item [label]="'Administration'" [link]="'/admin'"></app-navbar-item>
      <!-- TODO: À supprimer, pout tests uniquement -->
      <div class="w-4 h-1"></div>
      <app-navbar-item [label]="'Mon compte'" [disabled]="true"></app-navbar-item>
      <app-navbar-item (click)="logout()" [label]="'Déconnexion'" [disabled]="false"></app-navbar-item>
      <app-navbar-item [label]="'Add user'" [link]="'/userform'"></app-navbar-item>
      <app-navbar-item [label]="'Add ue'" [link]="'/ueform'"></app-navbar-item>
      <!-- Fin À supprimer, pout tests uniquement -->
    </nav>
  </div>
  <div class="flex justify-center items-center gap-4">
    <div class="size-8 relative">
      <div class="inset-0 absolute bg-zinc-300 rounded-full"></div>
      <ng-container *ngIf="user">
        <div *ngIf="!user.avatar; else avatarImage" class="left-1/2 top-1/2 absolute justify-start text-black text-xs font-normal text-center transform -translate-x-1/2 -translate-y-1/2">
          {{ getInitiales() }}
        </div>
        <ng-template #avatarImage>
          <img [src]="user.avatar" alt="avatar" class="absolute inset-0 rounded-full">
        </ng-template>
      </ng-container>
    </div>
  </div>
</header>
